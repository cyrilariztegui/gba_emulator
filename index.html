<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>GBA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ÉCRAN D'ACCUEIL -->
  <div id="screen-home" class="screen active">
    <header class="home-header">
      <h1 class="logo">GBA</h1>
      <p class="subtitle">Game Boy Advance</p>
    </header>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="rom-input" accept=".gba,.gb,.gbc" hidden />
      <div class="drop-icon">▶</div>
      <p class="drop-label">Charger une ROM</p>
      <p class="drop-hint">.gba · .gb · .gbc</p>
    </div>

    <div id="recent-list" class="recent-list hidden">
      <p class="section-label">Récents</p>
      <ul id="recent-items"></ul>
    </div>

    <nav class="home-nav">
      <button class="nav-btn" id="btn-saves-list">💾 Sauvegardes</button>
      <button class="nav-btn" id="btn-cheats-list">🔑 Codes</button>
    </nav>
  </div>

  <!-- ÉCRAN JEU -->
  <div id="screen-game" class="screen">
    <div id="game-bar">
      <button id="btn-back" class="icon-btn" title="Retour">←</button>
      <span id="game-title-bar">—</span>
      <div class="game-bar-actions">
        <button id="btn-save-state" class="icon-btn" title="Sauvegarder">💾</button>
        <button id="btn-load-state" class="icon-btn" title="Charger">📂</button>
        <button id="btn-cheats" class="icon-btn" title="Codes">🔑</button>
        <button id="btn-fullscreen" class="icon-btn" title="Plein écran">⛶</button>
      </div>
    </div>

    <div id="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>

    <div id="controls">
      <!-- D-PAD -->
      <div class="dpad" id="dpad">
        <button class="dpad-btn dpad-up"   data-key="up">▲</button>
        <button class="dpad-btn dpad-left" data-key="left">◀</button>
        <button class="dpad-btn dpad-center"></button>
        <button class="dpad-btn dpad-right" data-key="right">▶</button>
        <button class="dpad-btn dpad-down"  data-key="down">▼</button>
      </div>

      <!-- BOUTONS CENTRAUX -->
      <div class="center-btns">
        <button class="sys-btn" data-key="select">SELECT</button>
        <button class="sys-btn" data-key="start">START</button>
      </div>

      <!-- BOUTONS ACTION -->
      <div class="action-btns">
        <div class="ab-row">
          <button class="action-btn btn-b" data-key="b">B</button>
          <button class="action-btn btn-a" data-key="a">A</button>
        </div>
      </div>
    </div>

    <!-- BOUTONS SHOULDER -->
    <div id="shoulder-btns">
      <button class="shoulder-btn" data-key="l">L</button>
      <button class="shoulder-btn" data-key="r">R</button>
    </div>
  </div>

  <!-- MODAL SAVE STATES -->
  <div id="modal-saves" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Sauvegardes</h2>
        <button class="modal-close" data-modal="modal-saves">✕</button>
      </div>
      <div id="saves-grid" class="saves-grid"></div>
      <p id="saves-empty" class="empty-msg">Aucune sauvegarde.</p>
    </div>
  </div>

  <!-- MODAL CHEATS -->
  <div id="modal-cheats" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Codes GameShark</h2>
        <button class="modal-close" data-modal="modal-cheats">✕</button>
      </div>
      <div class="cheat-form">
        <input id="cheat-desc" type="text" placeholder="Nom du code" maxlength="32" />
        <input id="cheat-code" type="text" placeholder="XXXXXXXX YYYYYYYY" maxlength="17" />
        <button id="btn-add-cheat">Ajouter</button>
      </div>
      <ul id="cheats-list-items"></ul>
      <p id="cheats-empty" class="empty-msg">Aucun code actif.</p>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- mGBA WASM -->
  <script src="https://cdn.jsdelivr.net/npm/mgba-wasm@0.3.0/dist/mgba.js"></script>
  <script src="saves.js"></script>
  <script src="cheats.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
